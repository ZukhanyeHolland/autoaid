<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auto Aid – Log In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: url('assets/login-background.jpg') no-repeat center center/cover;
      min-height: 100vh;
      position: relative;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* AutoAid branding outside the card */
    .branding {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      padding: 35px 30px;
    }

    .card h2 {
      font-size: 1.7rem;
      color: #2c3e50;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.95rem;
      margin-top: 15px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 25px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background-color: #0056cc;
    }

    .alt-link {
      margin-top: 20px;
      font-size: 0.9rem;
      text-align: center;
      color: #555;
    }

    .alt-link a {
      color: #007bff;
    }

    .alt-link a:hover {
      text-decoration: underline;
    }

    #error {
      margin-top: 15px;
      color: #e74c3c;
      font-size: 0.9rem;
      text-align: center;
    }

    .home-link {
      display: block;
      margin-top: 15px;
      text-align: center;
      font-size: 0.85rem;
      color: #007bff;
      font-weight: 500;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      .branding {
        font-size: 1.2rem;
        top: 15px;
        left: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- AutoAid logo outside login card -->
  <div class="branding">AutoAid</div>

  <div class="card">
    <h2>Welcome Back</h2>
    <div id="error"></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button class="btn" id="loginBtn" type="button">Log In</button>

    <p class="alt-link">
      Don’t have an account? <a href="signup.html">Sign up here</a>
    </p>
    <a href="index.html" class="home-link">← Back to Home</a>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCCYcBWUYBiwzjT24xFgGnFKMOJBMUXwqw",
      authDomain: "auto-aid-2025.firebaseapp.com",
      projectId: "auto-aid-2025",
      storageBucket: "auto-aid-2025.firebasestorage.app",
      messagingSenderId: "222027175722",
      appId: "1:222027175722:web:d50d1f191e7ce000917053",
      measurementId: "G-5CSWH9SVS1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errDiv   = document.getElementById('error');
      errDiv.textContent = '';

      if (!email || !password) {
        errDiv.textContent = 'Please enter both email and password.';
        return;
      }

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const uid  = cred.user.uid;
        const snap = await db.collection('users').doc(uid).get();
        if (!snap.exists) throw new Error('User profile not found.');

        const role = snap.data().role;
        console.log('Logged in as role:', role);

        if (role === 'provider') {
          window.location = 'provider-dashboard.html';
        } else {
          window.location = 'customer-dashboard.html';
        }
      } catch (e) {
        console.error(e);
        errDiv.textContent = e.message;
      }
    });
  </script>
</body>
</html>
