<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pay for Service – Auto Aid</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Segoe UI',sans-serif;
      background:#f4f6f8;
    }
    .card {
      background:white;
      padding:24px;
      border-radius:8px;
      box-shadow:0 2px 12px rgba(0,0,0,0.1);
      width:320px;
      text-align:center;
    }
    .card h2 { margin-bottom:16px; color:#2c3e50; }
    .card p { margin-bottom:24px; font-size:1.1rem; }

    /* Buttons */
    #payBtn, #cancelBtn {
      padding:12px 24px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      font-size:1rem;
      transition: background .2s;
      margin: 6px;
    }
    #payBtn {
      background:#007bff;
      color:white;
    }
    #payBtn:hover {
      background:#005bb5;
    }
    #cancelBtn {
      background:#ccc;
      color:#333;
    }
    #cancelBtn:hover {
      background:#999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Complete Your Payment</h2>
    <p id="amount">Loading amount…</p>
    <button id="payBtn">Pay Now</button>
    <button id="cancelBtn">Cancel</button>
  </div>

  <!-- Paystack Inline JS -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    // Initialize Firebase (unchanged)
    const config = {
      apiKey: "AIzaSyCCYcBWUYBiwzjT24xFgGnFKMOJBMUXwqw",
      authDomain: "auto-aid-2025.firebaseapp.com",
      projectId: "auto-aid-2025"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // Read requestId from URL
    const params = new URLSearchParams(window.location.search);
    const requestId = params.get('requestId');
    const amountEl  = document.getElementById('amount');
    const payBtn    = document.getElementById('payBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    if (!requestId) {
      amountEl.textContent = 'Invalid request.';
      payBtn.disabled = true;
      cancelBtn.disabled = true;
      throw new Error('No requestId in URL');
    }

    let userEmail = '';
    let amountDue = 0;

    // Fetch cost and user email
    auth.onAuthStateChanged(user => {
      if (!user) return window.location = 'login.html';
      userEmail = user.email;

      db.collection('requests').doc(requestId).get().then(doc => {
        if (!doc.exists) {
          amountEl.textContent = 'Request not found.';
          payBtn.disabled = true;
          return;
        }
        const data = doc.data();
        if (data.paid) {
          amountEl.textContent = 'Already paid. Thank you!';
          payBtn.disabled = true;
          return;
        }
        amountDue = data.cost;
        amountEl.textContent = `Amount Due: R${amountDue.toFixed(2)}`;
      });
    });

    // Paystack integration (unchanged)
    payBtn.addEventListener('click', () => {
      if (!amountDue) return alert('Invalid amount.');

      const handler = PaystackPop.setup({
        key: 'pk_live_a58fe5cab67568237e98311230f22c693aebeb76',
        email: userEmail,
        amount: Math.round(amountDue * 100),
        currency: 'ZAR',
        ref: 'autoaid_' + Math.floor((Math.random() * 1000000000) + 1),
        metadata: {
          custom_fields: [{
            display_name: "Request ID",
            variable_name: "request_id",
            value: requestId
          }]
        },
        callback: function(response) {
          // Payment successful
          db.collection('requests').doc(requestId).update({
            paid: true,
            paidAt: firebase.firestore.FieldValue.serverTimestamp(),
            paystackRef: response.reference
          }).then(() => {
            alert('Payment successful! Thank you.');
            window.location = 'customer-dashboard.html';
          }).catch(err => {
            console.error(err);
            alert('Error updating payment status.');
          });
        },
        onClose: function() {
          alert('Payment window closed. You can pay anytime from your dashboard.');
        }
      });
      handler.openIframe();
    });


    
    // CANCEL button: update Firestore and redirect
    cancelBtn.addEventListener('click', () => {
      // 1️⃣ Ask the user for confirmation
    const ok = confirm('Are you sure you want to cancel this request?');
    if (!ok) return;  // If they click "Cancel", do nothing
      db.collection('requests').doc(requestId).update({
        status: 'cancelled',
        cancelledAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        window.location = 'customer-dashboard.html';
      }).catch(error => {
        console.error("Error cancelling request:", error);
        alert("Failed to cancel request. Please try again.");
      });
    });
  </script>
</body>
</html>
