<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auto Aid – Sign Up</title>

  <!-- Tailwind for quick, responsive styling -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    body {
      background: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('./assets/signup-bg.jpg') center/cover no-repeat;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-8 relative">

  <!-- AutoAid Logo Text -->
  <div class="absolute top-4 left-4 text-white text-2xl md:text-3xl font-bold tracking-wide">
    AutoAid
  </div>

  <div class="bg-white bg-opacity-90 rounded-2xl shadow-2xl w-full max-w-md p-8 mt-8">
    <!-- Home link -->
    <div class="mb-4">
      <a href="index.html" class="text-blue-600 hover:underline font-medium">
        ← Home
      </a>
    </div>

    <h2 class="text-2xl md:text-3xl font-bold text-center text-blue-600 mb-6">
      Create Your Account
    </h2>

    <div id="error" class="text-red-600 text-sm text-center mb-4"></div>

    <div class="space-y-4">
      <!-- First & Surname -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="firstName" class="block mb-1 font-semibold text-gray-700">First Name</label>
          <input type="text" id="firstName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:outline-none" />
        </div>
        <div>
          <label for="surname" class="block mb-1 font-semibold text-gray-700">Surname</label>
          <input type="text" id="surname" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>

      <!-- ID Number & Phone -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="idNumber" class="block mb-1 font-semibold text-gray-700">ID Number</label>
          <input type="text" id="idNumber" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:outline-none" />
        </div>
        <div>
          <label for="phone" class="block mb-1 font-semibold text-gray-700">Phone Number</label>
          <input type="tel" id="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>

      <!-- Email & Password -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="email" class="block mb-1 font-semibold text-gray-700">Email</label>
          <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:outline-none" />
        </div>
        <div>
          <label for="password" class="block mb-1 font-semibold text-gray-700">Password</label>
          <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>

      <!-- Signup Button -->
      <button id="signupBtn"
              class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition duration-300">
        Sign Up
      </button>
    </div>

    <p class="text-center text-sm text-gray-600 mt-6">
      Already have an account?
      <a href="login.html" class="text-blue-600 hover:underline">Log in here</a>.
    </p>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCCYcBWUYBiwzjT24xFgGnFKMOJBMUXwqw",
      authDomain: "auto-aid-2025.firebaseapp.com",
      projectId: "auto-aid-2025",
      storageBucket: "auto-aid-2025.firebasestorage.app",
      messagingSenderId: "222027175722",
      appId: "1:222027175722:web:d50d1f191e7ce000917053",
      measurementId: "G-5CSWH9SVS1"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    const PROVIDER_EMAILS = [
      "kh@gmail.com",
      "autoaidtowing101@gmail.com",
      "autoaidjumostart101@gmail.com",
      "flattire@gmail.com",
      "efuild@gmail.com",
      "epickup@gmail.com"
    ];

    document.getElementById('signupBtn').addEventListener('click', async () => {
      const firstName = document.getElementById('firstName').value.trim();
      const surname   = document.getElementById('surname').value.trim();
      const idNumber  = document.getElementById('idNumber').value.trim();
      const phone     = document.getElementById('phone').value.trim();
      const email     = document.getElementById('email').value.trim().toLowerCase();
      const password  = document.getElementById('password').value;
      const errDiv    = document.getElementById('error');
      errDiv.textContent = '';

      if (!firstName || !surname || !idNumber || !phone || !email || !password) {
        errDiv.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        const uid = userCred.user.uid;
        const role = PROVIDER_EMAILS.includes(email) ? 'provider' : 'customer';

        await db.collection('users').doc(uid).set({
          firstName,
          surname,
          idNumber,
          phone,
          email,
          role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        window.location = 'login.html';
      } catch (e) {
        errDiv.textContent = e.message;
      }
    });
  </script>
</body>
</html>
